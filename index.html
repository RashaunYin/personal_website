<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>房屋出租管理系统 (GitHub同步)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>
    <style>
        /* ===== 全局样式（同原版）===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #3b82f6; --primary-dark: #2563eb; --primary-light: #dbeafe;
            --success: #22c55e; --warning: #f59e0b; --danger: #ef4444;
            --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0;
            --gray-300: #cbd5e1; --gray-400: #94a3b8; --gray-500: #64748b;
            --gray-600: #475569; --gray-700: #334155; --gray-800: #1e293b;
            --gray-900: #0f172a;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
            --shadow-hover: 0 8px 30px rgba(0,0,0,0.08);
            --transition: all 0.25s ease;
        }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--gray-50); color: var(--gray-800); display: flex; min-height: 100vh; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--gray-100); }
        ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gray-400); }
        .sidebar {
            width: 240px; background: white; border-right: 1px solid var(--gray-200);
            padding: 24px 16px; display: flex; flex-direction: column;
            position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
            transition: transform 0.3s ease;
        }
        .sidebar-brand { font-size: 20px; font-weight: 700; color: var(--gray-900); padding: 0 8px 24px 8px; border-bottom: 1px solid var(--gray-200); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .sidebar-brand span { color: var(--primary); }
        .sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: 2px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 8px; cursor: pointer; transition: var(--transition); color: var(--gray-600); font-weight: 500; font-size: 14px; border: none; background: transparent; width: 100%; text-align: left; }
        .nav-item:hover { background: var(--gray-100); color: var(--gray-900); }
        .nav-item.active { background: var(--primary-light); color: var(--primary); }
        .nav-item .icon { font-size: 18px; width: 24px; text-align: center; }
        .sidebar-footer { border-top: 1px solid var(--gray-200); padding-top: 16px; font-size: 12px; color: var(--gray-400); text-align: center; }
        .main { margin-left: 240px; flex: 1; padding: 28px 32px 40px; min-height: 100vh; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
        .page-header h1 { font-size: 26px; font-weight: 700; color: var(--gray-900); }
        .page-header .subtitle { color: var(--gray-500); font-size: 14px; font-weight: 400; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .stat-card { background: white; border-radius: var(--radius); padding: 20px 24px; box-shadow: var(--shadow); border: 1px solid var(--gray-200); transition: var(--transition); }
        .stat-card:hover { box-shadow: var(--shadow-hover); }
        .stat-card .label { font-size: 13px; color: var(--gray-500); font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; }
        .stat-card .value { font-size: 32px; font-weight: 700; color: var(--gray-900); margin-top: 4px; }
        .stat-card .value .unit { font-size: 16px; font-weight: 400; color: var(--gray-400); margin-left: 4px; }
        .stat-card.primary .value { color: var(--primary); }
        .stat-card.success .value { color: var(--success); }
        .stat-card.warning .value { color: var(--warning); }
        .stat-card.danger .value { color: var(--danger); }
        .chart-container { background: white; border-radius: var(--radius); padding: 20px 24px 24px; box-shadow: var(--shadow); border: 1px solid var(--gray-200); margin-bottom: 28px; }
        .chart-container h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--gray-700); }
        .chart-wrap { position: relative; height: 260px; }
        .table-container { background: white; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--gray-200); overflow: hidden; margin-bottom: 20px; }
        .table-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--gray-200); flex-wrap: wrap; gap: 10px; }
        .table-header h3 { font-size: 16px; font-weight: 600; color: var(--gray-700); }
        .table-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .table-scroll { overflow-x: auto; padding: 0 4px 4px 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 800px; }
        table th { background: var(--gray-50); color: var(--gray-600); font-weight: 600; padding: 12px 14px; text-align: left; border-bottom: 2px solid var(--gray-200); white-space: nowrap; position: sticky; top: 0; z-index: 2; }
        table td { padding: 10px 14px; border-bottom: 1px solid var(--gray-100); color: var(--gray-700); vertical-align: middle; }
        table tr:hover td { background: var(--gray-50); }
        table .status-badge { display: inline-block; padding: 2px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-badge.occupied { background: #dcfce7; color: #166534; }
        .status-badge.vacant { background: #fee2e2; color: #991b1b; }
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; border: none; cursor: pointer; transition: var(--transition); background: var(--gray-100); color: var(--gray-700); }
        .btn:hover { background: var(--gray-200); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #16a34a; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-warning:hover { background: #d97706; }
        .btn-sm { padding: 4px 12px; font-size: 12px; }
        .btn-outline { background: transparent; border: 1px solid var(--gray-300); }
        .btn-outline:hover { background: var(--gray-50); }
        .filter-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .filter-group select, .filter-group input { padding: 6px 12px; border-radius: 8px; border: 1px solid var(--gray-300); font-size: 13px; background: white; color: var(--gray-700); outline: none; transition: var(--transition); }
        .filter-group select:focus, .filter-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
        .month-selector { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .month-selector select { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--gray-300); font-size: 14px; background: white; font-weight: 500; outline: none; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.45); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal { background: white; border-radius: var(--radius); max-width: 640px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 28px 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); animation: modalIn 0.25s ease; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.96) translateY(12px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .modal h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: var(--gray-900); }
        .modal .form-group { margin-bottom: 16px; }
        .modal .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--gray-700); margin-bottom: 4px; }
        .modal .form-group input, .modal .form-group select, .modal .form-group textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--gray-300); border-radius: 8px; font-size: 14px; outline: none; transition: var(--transition); background: white; }
        .modal .form-group input:focus, .modal .form-group select:focus, .modal .form-group textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12); }
        .modal .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .modal .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--gray-200); }
        .empty-state { padding: 40px 20px; text-align: center; color: var(--gray-400); }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state p { font-size: 15px; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); width: 260px; }
            .sidebar.open { transform: translateX(0); }
            .main { margin-left: 0; padding: 20px 16px; }
            .modal .form-row { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .page-header h1 { font-size: 20px; }
            .table-header { flex-direction: column; align-items: stretch; }
            .table-actions { justify-content: stretch; }
            .table-actions .btn { flex: 1; justify-content: center; }
            .filter-group { flex-direction: column; align-items: stretch; }
            .month-selector { flex-direction: column; align-items: stretch; }
            .chart-wrap { height: 180px; }
            .menu-toggle { display: flex !important; }
        }
        .menu-toggle { display: none; background: none; border: none; font-size: 24px; cursor: pointer; color: var(--gray-700); padding: 4px; }
        .menu-toggle:hover { color: var(--gray-900); }
        .text-center { text-align: center; }
        .text-muted { color: var(--gray-400); font-size: 13px; }
        .mt-16 { margin-top: 16px; }
        .mb-16 { margin-bottom: 16px; }
        .gap-8 { gap: 8px; }
        .flex { display: flex; }
        .flex-wrap { flex-wrap: wrap; }
        .items-center { align-items: center; }
        .w-full { width: 100%; }
        .page { display: none; }
        .page.active { display: block; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: var(--gray-900); color: white; padding: 14px 24px; border-radius: var(--radius); font-size: 14px; font-weight: 500; box-shadow: 0 8px 30px rgba(0,0,0,0.2); z-index: 300; transform: translateY(20px); opacity: 0; transition: all 0.35s ease; pointer-events: none; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .toast.warning { background: var(--warning); }
        .token-setup { background: white; border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid var(--gray-200); }
        .token-setup label { font-weight: 600; margin-right: 10px; }
        .token-setup input { flex: 1; padding: 8px 12px; border: 1px solid var(--gray-300); border-radius: 8px; font-size: 14px; }
        .token-setup .flex { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    </style>
</head>
<body>

<!-- 侧边栏 -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">🏠 <span>房屋出租<br>管理系统</span></div>
    <nav class="sidebar-nav">
        <button class="nav-item active" data-page="dashboard"><span class="icon">📊</span> 仪表盘</button>
        <button class="nav-item" data-page="tenants"><span class="icon">👤</span> 租客管理</button>
        <button class="nav-item" data-page="monthly"><span class="icon">📅</span> 月度租金</button>
    </nav>
    <div class="sidebar-footer">v1.0 · 数据同步至 GitHub</div>
</aside>

<!-- 主内容 -->
<main class="main">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
        <button class="menu-toggle" id="menuToggle" style="display:none;">☰</button>
        <span style="font-size:18px;font-weight:600;color:var(--gray-800);display:none;" id="mobileBrand">🏠 房屋出租</span>
    </div>

    <!-- Token 设置区 -->
    <div class="token-setup" id="tokenSetup">
        <div class="flex">
            <label>🔑 GitHub Token：</label>
            <input type="password" id="githubTokenInput" placeholder="输入你的 Personal Access Token" />
            <button class="btn btn-primary" id="setTokenBtn">保存 Token</button>
            <button class="btn btn-outline" id="clearTokenBtn">清除</button>
        </div>
        <p style="font-size:12px;color:var(--gray-400);margin-top:8px;">Token 仅保存在浏览器本地，用于读写 GitHub 仓库中的 rent_data.json。需 repo 权限。</p>
    </div>

    <!-- 仪表盘 -->
    <section class="page active" id="page-dashboard">
        <div class="page-header">
            <div><h1>📊 仪表盘</h1><div class="subtitle">房屋出租数据总览</div></div>
            <button class="btn btn-outline" onclick="refreshData()">🔄 刷新数据</button>
        </div>
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card primary"><div class="label">🏠 总房间数</div><div class="value" id="statTotal">0</div></div>
            <div class="stat-card success"><div class="label">✅ 在租</div><div class="value" id="statOccupied">0</div></div>
            <div class="stat-card warning"><div class="label">📭 空置</div><div class="value" id="statVacant">0</div></div>
            <div class="stat-card primary"><div class="label">💰 年租金总计</div><div class="value" id="statTotalRent">¥0</div></div>
        </div>
        <div class="chart-container"><h3>📈 各月份租金统计</h3><div class="chart-wrap"><canvas id="rentChart"></canvas></div></div>
        <div class="table-container">
            <div class="table-header"><h3>📭 当前空置房间</h3><span class="text-muted" id="vacantCount">共 0 间</span></div>
            <div class="table-scroll" id="vacantList"><div class="empty-state"><div class="icon">🎉</div><p>暂无空置房间</p></div></div>
        </div>
    </section>

    <!-- 租客管理 -->
    <section class="page" id="page-tenants">
        <div class="page-header"><div><h1>👤 租客管理</h1><div class="subtitle">管理所有房间的租客信息</div></div><button class="btn btn-primary" onclick="openTenantModal()">＋ 添加租客</button></div>
        <div class="table-container">
            <div class="table-header">
                <h3>📋 租客信息列表</h3>
                <div class="filter-group">
                    <select id="tenantFilter" onchange="renderTenants()"><option value="all">全部状态</option><option value="在租">在租</option><option value="空置">空置</option></select>
                    <input type="text" id="tenantSearch" placeholder="搜索房号/姓名..." oninput="renderTenants()" />
                </div>
            </div>
            <div class="table-scroll" id="tenantTableWrap"></div>
        </div>
    </section>

    <!-- 月度租金 -->
    <section class="page" id="page-monthly">
        <div class="page-header">
            <div><h1>📅 月度租金统计</h1><div class="subtitle">查看各月份租金明细</div></div>
            <div class="month-selector">
                <label style="font-weight:500;font-size:14px;">选择月份：</label>
                <select id="monthSelector" onchange="renderMonthly()">
                    <option value="一月">一月</option><option value="二月">二月</option><option value="三月">三月</option>
                    <option value="四月">四月</option><option value="五月">五月</option><option value="六月">六月</option>
                    <option value="七月">七月</option><option value="八月">八月</option><option value="九月">九月</option>
                    <option value="十月">十月</option><option value="十一月">十一月</option><option value="十二月">十二月</option>
                </select>
            </div>
        </div>
        <div class="table-container">
            <div class="table-header"><h3 id="monthlyTitle">📋 一月租金明细</h3><span class="text-muted" id="monthlyTotal">总计：¥0</span></div>
            <div class="table-scroll" id="monthlyTableWrap"></div>
        </div>
    </section>
</main>

<!-- 弹窗 -->
<div class="modal-overlay" id="tenantModal">
    <div class="modal">
        <h2 id="tenantModalTitle">添加租客</h2>
        <form id="tenantForm" onsubmit="saveTenant(event)">
            <input type="hidden" id="editRoom" value="" />
            <div class="form-row">
                <div class="form-group"><label>房号 *</label><select id="fRoom" required><option value="">请选择房号</option></select></div>
                <div class="form-group"><label>出租状态 *</label><select id="fStatus" required><option value="在租">在租</option><option value="空置">空置</option></select></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>月租金 (元)</label><input type="number" id="fRent" placeholder="如: 500" step="0.01" /></div>
                <div class="form-group"><label>押金 (元)</label><input type="number" id="fDeposit" placeholder="如: 1000" step="0.01" /></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>租客姓名</label><input type="text" id="fName" placeholder="姓名" /></div>
                <div class="form-group"><label>性别</label><select id="fGender"><option value="">请选择</option><option value="男">男</option><option value="女">女</option></select></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>联系电话</label><input type="text" id="fPhone" placeholder="手机号" /></div>
                <div class="form-group"><label>身份证号码</label><input type="text" id="fIdCard" placeholder="身份证号" /></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>紧急联系人</label><input type="text" id="fEmergency" placeholder="紧急联系人姓名" /></div>
                <div class="form-group"><label>紧急联系人电话</label><input type="text" id="fEmergencyPhone" placeholder="紧急联系人电话" /></div>
            </div>
            <div class="form-group"><label>备注</label><textarea id="fNote" rows="2" placeholder="其他备注信息"></textarea></div>
            <div class="modal-actions"><button type="button" class="btn btn-outline" onclick="closeTenantModal()">取消</button><button type="submit" class="btn btn-primary">保存</button></div>
        </form>
    </div>
</div>

<div class="toast" id="toast"></div>

    function utf8ToBase64(str) {
        const encoder = new TextEncoder();
        const bytes = encoder.encode(str);
        let binary = '';
        for (let i = 0; i < bytes.length; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary);
    }

    function base64ToUtf8(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
        }
        const decoder = new TextDecoder();
        return decoder.decode(bytes);

        '405': { status: '在租', rent: '', deposit: '', name: '', gender: '', phone: '', emergency: '', emergencyPhone: '', idCard: '', note: '' },
        '501': { status: '在租', rent: '390', deposit: '', name: '', gender: '', phone: '', emergency: '', emergencyPhone: '', idCard: '', note: '' },
        '502': { status: '在租', rent: '300', deposit: '', name: '', gender: '', phone: '', emergency: '', emergencyPhone: '', idCard: '', note: '' },
        '503': { status: '在租', rent: '230', deposit: '', name: '', gender: '', phone: '', emergency: '', emergencyPhone: '', idCard: '', note: '没空调' },
        '504': { status: '在租', rent: '570', deposit: '', name: '', gender: '', phone: '', emergency: '', emergencyPhone: '', idCard: '', note: '' },
        '505': { status: '在租', rent: '400', deposit: '', name: '', gender: '', phone: '', emergency: '', emergencyPhone: '', idCard: '', note: '比较热' },
        '601': { status: '空置', rent: '', deposit: '', name: '', gender: '', phone: '', emergency: '', emergencyPhone: '', idCard: '', note: '' }
    };
    function generateMonthlyData() {
        const data = {};
        MONTHS.forEach(month => {
            data[month] = {};
            ROOMS.forEach(room => {
                data[month][room] = { tenant: '', baseRent: '', lastElec: 0, thisElec: 0, actualElec: 0, elecFee: 0, lastWater: 0, thisWater: 0, actualWater: 0, waterFee: 0, total: 0 };
            });
        });
        return data;
    }
    function getDefaultStore() {
        return { tenants: JSON.parse(JSON.stringify(INITIAL_TENANTS)), monthly: generateMonthlyData() };
    }

    // ================================================================
    // GitHub API 操作
    // ================================================================
    let githubToken = localStorage.getItem('githubToken') || '';

    async function getFileSha(token) {
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
        const resp = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
        if (resp.status === 404) return null;
        if (!resp.ok) throw new Error(`获取文件信息失败: ${resp.status}`);
        const data = await resp.json();
        return data.sha;
    }

    async function loadDataFromGitHub(token) {
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
        const resp = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
        if (resp.status === 404) {
            // 文件不存在，创建默认数据并上传
            const defaultData = getDefaultStore();
            await uploadData(token, defaultData, null);
            return defaultData;
        }
        if (!resp.ok) throw new Error(`加载数据失败: ${resp.status}`);
        const data = await resp.json();
        const content = base64ToUtf8(data.content);
        return JSON.parse(content);
    }

    async function uploadData(token, content, sha) {
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
        const payload = {
            message: '更新租金数据 via 网页',
            content: utf8ToBase64(JSON.stringify(content, null, 2)),
            sha: sha || undefined
        };
        const resp = await fetch(url, {
            method: 'PUT',
            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (!resp.ok) {
            const err = await resp.json();
            throw new Error(`上传失败: ${err.message || resp.status}`);
        }
        return await resp.json();
    }

    // ================================================================
    // 存储与同步
    // ================================================================
    let store = null;
    let chartInstance = null;

    // 同步数据到 GitHub（内部处理 sha）
    async function syncStoreToGitHub() {
        if (!githubToken) { showToast('请先设置 GitHub Token', 'error'); return false; }
        try {
            const sha = await getFileSha(githubToken);
            await uploadData(githubToken, store, sha);
            showToast('✅ 数据已同步到 GitHub', 'success');
            return true;
        } catch (e) {
            showToast('❌ 同步失败: ' + e.message, 'error');
            console.error(e);
            return false;
        }
    }

    // 从 GitHub 拉取数据并更新界面
    async function pullDataFromGitHub() {
        if (!githubToken) { showToast('请先设置 GitHub Token', 'error'); return false; }
        try {
            store = await loadDataFromGitHub(githubToken);
            // 补全缺失的房间和月份（防止版本差异）
            let needUpdate = false;
            ROOMS.forEach(room => {
                if (!store.tenants[room]) {
                    store.tenants[room] = { status: '空置', rent: '', deposit: '', name: '', gender: '', phone: '', emergency: '', emergencyPhone: '', idCard: '', note: '' };
                    needUpdate = true;
                }
                MONTHS.forEach(month => {
                    if (!store.monthly[month]) store.monthly[month] = {};
                    if (!store.monthly[month][room]) {
                        store.monthly[month][room] = { tenant: '', baseRent: '', lastElec: 0, thisElec: 0, actualElec: 0, elecFee: 0, lastWater: 0, thisWater: 0, actualWater: 0, waterFee: 0, total: 0 };
                        needUpdate = true;
                    }
                });
            });
            if (needUpdate) {
                await syncStoreToGitHub(); // 同步修正后的数据
            }
            renderAll();
            showToast('✅ 数据已从 GitHub 加载', 'success');
            return true;
        } catch (e) {
            showToast('❌ 加载数据失败: ' + e.message, 'error');
            console.error(e);
            return false;
        }
    }

    // ================================================================
    // UI 渲染函数
    // ================================================================
    function renderAll() {
        renderDashboard();
        renderTenants();
        renderMonthly();
    }

    function renderDashboard() {
        if (!store) return;
        const tenants = store.tenants;
        let total = ROOMS.length, occupied = 0, vacant = 0;
        ROOMS.forEach(room => { if (tenants[room] && tenants[room].status === '在租') occupied++; else vacant++; });
        document.getElementById('statTotal').textContent = total;
        document.getElementById('statOccupied').textContent = occupied;
        document.getElementById('statVacant').textContent = vacant;
        let totalRent = 0;
        MONTHS.forEach(month => {
            const mData = store.monthly[month];
            if (mData) ROOMS.forEach(room => { if (mData[room] && mData[room].total) totalRent += parseFloat(mData[room].total) || 0; });
        });
        document.getElementById('statTotalRent').textContent = '¥' + Math.round(totalRent).toLocaleString();
        const vacantRooms = ROOMS.filter(r => tenants[r] && tenants[r].status === '空置');
        const container = document.getElementById('vacantList');
        if (vacantRooms.length === 0) {
            container.innerHTML = `<div class="empty-state"><div class="icon">🎉</div><p>暂无空置房间</p></div>`;
        } else {
            let html = `<table><thead><tr><th>房号</th><th>月租金</th><th>备注</th></tr></thead><tbody>`;
            vacantRooms.forEach(room => {
                const t = tenants[room];
                html += `<tr><td><strong>${room}</strong></td><td>${t.rent || '-'}</td><td>${t.note || '-'}</td></tr>`;
            });
            html += `</tbody></table>`;
            container.innerHTML = html;
        }
        document.getElementById('vacantCount').textContent = `共 ${vacantRooms.length} 间`;
        renderChart();
    }

    function renderChart() {
        if (!store) return;
        const ctx = document.getElementById('rentChart').getContext('2d');
        const monthlyTotals = MONTHS.map(month => {
            let sum = 0;
            const mData = store.monthly[month];
            if (mData) ROOMS.forEach(room => { if (mData[room] && mData[room].total) sum += parseFloat(mData[room].total) || 0; });
            return Math.round(sum);
        });
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: MONTHS,
                datasets: [{
                    label: '月租金收入 (元)',
                    data: monthlyTotals,
                    backgroundColor: 'rgba(59, 130, 246, 0.7)',
                    borderColor: 'rgba(59, 130, 246, 1)',
                    borderWidth: 2,
                    borderRadius: 6,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(context) { return '¥' + context.parsed.y.toLocaleString(); } } } },
                scales: { y: { beginAtZero: true, ticks: { callback: function(value) { return '¥' + value; } } } }
            }
        });
    }

    function renderTenants() {
        if (!store) return;
        const filter = document.getElementById('tenantFilter').value;
        const search = document.getElementById('tenantSearch').value.trim().toLowerCase();
        const tenants = store.tenants;
        let list = ROOMS.filter(room => {
            const t = tenants[room];
            if (!t) return false;
            if (filter !== 'all' && t.status !== filter) return false;
            if (search) {
                const match = room.toLowerCase().includes(search) || (t.name && t.name.toLowerCase().includes(search)) || (t.phone && t.phone.includes(search));
                if (!match) return false;
            }
            return true;
        });
        const wrap = document.getElementById('tenantTableWrap');
        if (list.length === 0) {
            wrap.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>没有找到匹配的租客信息</p></div>`;
            return;
        }
        let html = `<table><thead><tr><th>房号</th><th>状态</th><th>月租金</th><th>押金</th><th>租客</th><th>性别</th><th>电话</th><th>紧急联系人</th><th>紧急电话</th><th>备注</th><th>操作</th></tr></thead><tbody>`;
        list.forEach(room => {
            const t = tenants[room];
            html += `<tr><td><strong>${room}</strong></td><td>${t.status === '在租' ? '<span class="status-badge occupied">在租</span>' : '<span class="status-badge vacant">空置</span>'}</td><td>${t.rent || '-'}</td><td>${t.deposit || '-'}</td><td>${t.name || '-'}</td><td>${t.gender || '-'}</td><td>${t.phone || '-'}</td><td>${t.emergency || '-'}</td><td>${t.emergencyPhone || '-'}</td><td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${t.note || '-'}</td><td><button class="btn btn-primary btn-sm" onclick="editTenant('${room}')">✎</button><button class="btn btn-danger btn-sm" onclick="deleteTenant('${room}')">✕</button></td></tr>`;
        });
        html += `</tbody></table>`;
        wrap.innerHTML = html;
    }

    function openTenantModal(room = null) {
        const modal = document.getElementById('tenantModal');
        document.getElementById('tenantForm').reset();
        document.getElementById('editRoom').value = '';
        const sel = document.getElementById('fRoom');
        sel.innerHTML = '<option value="">请选择房号</option>';
        ROOMS.forEach(r => { const opt = document.createElement('option'); opt.value = r; opt.textContent = r; sel.appendChild(opt); });
        if (room) {
            const t = store.tenants[room];
            if (t) {
                document.getElementById('tenantModalTitle').textContent = '编辑租客信息';
                document.getElementById('editRoom').value = room;
                document.getElementById('fRoom').value = room;
                document.getElementById('fStatus').value = t.status || '空置';
                document.getElementById('fRent').value = t.rent || '';
                document.getElementById('fDeposit').value = t.deposit || '';
                document.getElementById('fName').value = t.name || '';
                document.getElementById('fGender').value = t.gender || '';
                document.getElementById('fPhone').value = t.phone || '';
                document.getElementById('fIdCard').value = t.idCard || '';
                document.getElementById('fEmergency').value = t.emergency || '';
                document.getElementById('fEmergencyPhone').value = t.emergencyPhone || '';
                document.getElementById('fNote').value = t.note || '';
                document.getElementById('fRoom').disabled = true;
            }
        } else {
            document.getElementById('tenantModalTitle').textContent = '添加租客';
            document.getElementById('fRoom').disabled = false;
            document.getElementById('fStatus').value = '在租';
        }
        modal.classList.add('show');
    }
    function closeTenantModal() { document.getElementById('tenantModal').classList.remove('show'); document.getElementById('fRoom').disabled = false; }

    async function saveTenant(e) {
        e.preventDefault();
        const room = document.getElementById('fRoom').value;
        if (!room) { showToast('请选择房号', 'error'); return; }
        const data = {
            status: document.getElementById('fStatus').value,
            rent: document.getElementById('fRent').value,
            deposit: document.getElementById('fDeposit').value,
            name: document.getElementById('fName').value,
            gender: document.getElementById('fGender').value,
            phone: document.getElementById('fPhone').value,
            idCard: document.getElementById('fIdCard').value,
            emergency: document.getElementById('fEmergency').value,
            emergencyPhone: document.getElementById('fEmergencyPhone').value,
            note: document.getElementById('fNote').value,
        };
        store.tenants[room] = data;
        await syncStoreToGitHub();
        closeTenantModal();
        renderTenants();
        showToast(`✅ ${room} 租客信息已保存`, 'success');
    }

    function editTenant(room) { openTenantModal(room); }

    async function deleteTenant(room) {
        if (!confirm(`确定要清空 ${room} 的租客信息吗？`)) return;
        store.tenants[room] = { status: '空置', rent: '', deposit: '', name: '', gender: '', phone: '', emergency: '', emergencyPhone: '', idCard: '', note: '' };
        await syncStoreToGitHub();
        renderTenants();
        showToast(`🗑️ ${room} 租客信息已清空`, 'warning');
    }

    document.getElementById('tenantModal').addEventListener('click', function(e) { if (e.target === this) closeTenantModal(); });

    // ================================================================
    // 月度租金
    // ================================================================
    function carryForward(month) {
        const monthIndex = MONTHS.indexOf(month);
        if (monthIndex <= 0) return;
        const prevMonth = MONTHS[monthIndex - 1];
        const prevData = store.monthly[prevMonth];
        if (!prevData) return;
        const currentData = store.monthly[month];
        if (!currentData) return;
        let updated = false;
        ROOMS.forEach(room => {
            const prevRow = prevData[room];
            if (!prevRow) return;
            if (!currentData[room]) {
                currentData[room] = { tenant: '', baseRent: '', lastElec: 0, thisElec: 0, actualElec: 0, elecFee: 0, lastWater: 0, thisWater: 0, actualWater: 0, waterFee: 0, total: 0 };
                updated = true;
            }
            const curRow = currentData[room];
            if (curRow.lastElec === undefined || curRow.lastElec === null || curRow.lastElec === 0) {
                curRow.lastElec = prevRow.thisElec || 0;
                updated = true;
            }
            if (curRow.lastWater === undefined || curRow.lastWater === null || curRow.lastWater === 0) {
                curRow.lastWater = prevRow.thisWater || 0;
                updated = true;
            }
        });
        if (updated) syncStoreToGitHub();
    }

    function renderMonthly() {
        if (!store) return;
        const month = document.getElementById('monthSelector').value;
        carryForward(month);
        const mData = store.monthly[month];
        const tenants = store.tenants;
        document.getElementById('monthlyTitle').textContent = `📋 ${month}租金明细`;
        let totalSum = 0;
        let html = `<table><thead><tr><th>房号</th><th>租客</th><th>基本房租</th><th>上月用电</th><th>本月用电</th><th>实际用电</th><th>电费</th><th>上月用水</th><th>本月用水</th><th>实际用水</th><th>水费</th><th>房租总计</th></tr></thead><tbody>`;
        ROOMS.forEach(room => {
            const row = mData[room] || { tenant: '', baseRent: '', lastElec: 0, thisElec: 0, actualElec: 0, elecFee: 0, lastWater: 0, thisWater: 0, actualWater: 0, waterFee: 0, total: 0 };
            const tenantInfo = tenants[room] || {};
            const isOccupied = tenantInfo.status === '在租';
            if (!isOccupied) {
                html += `<tr style="color:var(--gray-400);"><td>${room}</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr>`;
                return;
            }
            const thisElec = row.thisElec ?? '';
            const thisWater = row.thisWater ?? '';
            const baseRent = tenantInfo.rent || row.baseRent || '';
            const total = parseFloat(row.total) || 0;
            totalSum += total;
            html += `<tr><td><strong>${room}</strong></td><td>${tenantInfo.name || row.tenant || '-'}</td><td>${baseRent || '-'}</td><td>${row.lastElec ?? '-'}</td>
                <td><input type="number" step="0.01" value="${thisElec}" style="width:70px;padding:4px 6px;border:1px solid var(--gray-300);border-radius:6px;" onchange="updateMonthlyField('${month}','${room}','thisElec', this.value)" onkeydown="if(event.key==='Enter') this.blur()" /></td>
                <td>${row.actualElec ?? '-'}</td><td>${row.elecFee ? '¥' + row.elecFee : '-'}</td>
                <td>${row.lastWater ?? '-'}</td>
                <td><input type="number" step="0.01" value="${thisWater}" style="width:70px;padding:4px 6px;border:1px solid var(--gray-300);border-radius:6px;" onchange="updateMonthlyField('${month}','${room}','thisWater', this.value)" onkeydown="if(event.key==='Enter') this.blur()" /></td>
                <td>${row.actualWater ?? '-'}</td><td>${row.waterFee ? '¥' + row.waterFee : '-'}</td>
                <td><strong>${total ? '¥' + Math.round(total) : '-'}</strong></td></tr>`;
        });
        html += `</tbody></table>`;
        document.getElementById('monthlyTableWrap').innerHTML = html;
        document.getElementById('monthlyTotal').textContent = `总计：${'¥' + Math.round(totalSum).toLocaleString()}`;
    }

    async function updateMonthlyField(month, room, field, value) {
        if (!store.monthly[month]) store.monthly[month] = {};
        if (!store.monthly[month][room]) {
            store.monthly[month][room] = { tenant: '', baseRent: '', lastElec: 0, thisElec: 0, actualElec: 0, elecFee: 0, lastWater: 0, thisWater: 0, actualWater: 0, waterFee: 0, total: 0 };
        }
        const row = store.monthly[month][room];
        row[field] = parseFloat(value) || 0;
        const lastElec = row.lastElec || 0;
        const thisElec = row.thisElec || 0;
        row.actualElec = Math.max(0, thisElec - lastElec);
        row.elecFee = row.actualElec * 1.2;
        const lastWater = row.lastWater || 0;
        const thisWater = row.thisWater || 0;
        row.actualWater = Math.max(0, thisWater - lastWater);
        row.waterFee = row.actualWater * 3;
        const tenant = store.tenants[room];
        const baseRent = tenant && tenant.rent ? parseFloat(tenant.rent.replace(/[^0-9.]/g,'')) || 0 : 0;
        row.total = baseRent + (row.elecFee || 0) + (row.waterFee || 0);
        await syncStoreToGitHub();
        renderMonthly();
    }

    // ================================================================
    // 工具函数
    // ================================================================
    function showToast(msg, type = '') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'toast ' + type;
        setTimeout(() => el.classList.add('show'), 10);
        clearTimeout(el._timer);
        el._timer = setTimeout(() => el.classList.remove('show'), 3000);
    }

    // ================================================================
    // 导航、移动端
    // ================================================================
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            const page = this.dataset.page;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            document.getElementById('sidebar').classList.remove('open');
            if (page === 'dashboard') renderDashboard();
            else if (page === 'tenants') renderTenants();
            else if (page === 'monthly') renderMonthly();
        });
    });
    document.getElementById('menuToggle').addEventListener('click', function() { document.getElementById('sidebar').classList.toggle('open'); });
    function checkMobile() {
        const toggle = document.getElementById('menuToggle');
        const brand = document.getElementById('mobileBrand');
        if (window.innerWidth <= 768) { toggle.style.display = 'flex'; brand.style.display = 'inline'; } else { toggle.style.display = 'none'; brand.style.display = 'none'; document.getElementById('sidebar').classList.remove('open'); }
    }
    window.addEventListener('resize', checkMobile);
    checkMobile();

    // ================================================================
    // Token 管理
    // ================================================================
    document.getElementById('setTokenBtn').addEventListener('click', function() {
        const token = document.getElementById('githubTokenInput').value.trim();
        if (!token) { showToast('请输入 Token', 'error'); return; }
        githubToken = token;
        localStorage.setItem('githubToken', token);
        document.getElementById('githubTokenInput').value = '';
        showToast('✅ Token 已保存', 'success');
        pullDataFromGitHub();
    });
    document.getElementById('clearTokenBtn').addEventListener('click', function() {
        localStorage.removeItem('githubToken');
        githubToken = '';
        showToast('Token 已清除', 'warning');
    });

    // ================================================================
    // 初始化
    // ================================================================
    async function init() {
        const saved = localStorage.getItem('githubToken');
        if (saved) {
            githubToken = saved;
            document.getElementById('githubTokenInput').value = '已保存（隐藏）';
            await pullDataFromGitHub();
        } else {
            store = getDefaultStore();
            renderAll();
            showToast('⚠️ 未设置 GitHub Token，数据仅存在本地', 'warning');
        }
    }

    async function refreshData() {
        if (!githubToken) { showToast('请先设置 Token', 'error'); return; }
        await pullDataFromGitHub();
    }

    // 暴露给全局，供按钮调用
    window.refreshData = refreshData;
    window.openTenantModal = openTenantModal;
    window.editTenant = editTenant;
    window.deleteTenant = deleteTenant;
    window.saveTenant = saveTenant;
    window.closeTenantModal = closeTenantModal;
    window.updateMonthlyField = updateMonthlyField;
    window.renderTenants = renderTenants;
    window.renderMonthly = renderMonthly;

    init();
</script>
</body>
