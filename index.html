<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <!-- ★ 关键：视口设置，确保移动端正确缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes" />
    <title>房屋出租管理系统</title>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- SheetJS (XLSX) for Excel Export/Import -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

    <style>
        /* ===== 全局重置 & 变量 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --primary-light: #dbeafe;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 4px 16px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.08);
            --transition: all 0.25s ease;

            /* ★ 新增：相对单位基准 */
            --sidebar-width: 240px;
            --header-font: clamp(1.2rem, 4vw, 2rem);
            --card-min-width: 140px;
        }

        html {
            font-size: 16px;
            /* 基准字号，配合 clamp 使用 */;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            display: flex;
            min-height: 100vh;
            /* ★ 防止内容溢出 */
            overflow-x: hidden;
        }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--gray-100);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--gray-400);
        }

        /* ===== 侧边栏 ===== */
        .sidebar {
            width: var(--sidebar-width);
            background: white;
            border-right: 1px solid var(--gray-200);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            transition: transform 0.3s ease;
            /* ★ 防止侧边栏溢出 */
            overflow-y: auto;
        }

        .sidebar-brand {
            font-size: clamp(16px, 2vw, 20px);
            font-weight: 700;
            color: var(--gray-900);
            padding: 0 8px 24px 8px;
            border-bottom: 1px solid var(--gray-200);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .sidebar-brand span {
            color: var(--primary);
        }

        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--gray-600);
            font-weight: 500;
            font-size: clamp(13px, 1.2vw, 14px);
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
        }
        .nav-item:hover {
            background: var(--gray-100);
            color: var(--gray-900);
        }
        .nav-item.active {
            background: var(--primary-light);
            color: var(--primary);
        }
        .nav-item .icon {
            font-size: clamp(16px, 1.5vw, 18px);
            width: 24px;
            text-align: center;
            flex-shrink: 0;
        }

        .sidebar-footer {
            border-top: 1px solid var(--gray-200);
            padding-top: 16px;
            font-size: clamp(10px, 0.9vw, 12px);
            color: var(--gray-400);
            text-align: center;
            flex-shrink: 0;
        }

        /* ===== 主内容 ===== */
        .main {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: clamp(16px, 3vw, 32px) clamp(12px, 3vw, 32px) 40px;
            min-height: 100vh;
            width: calc(100% - var(--sidebar-width));
            max-width: 100%;
            overflow-x: hidden;
        }

        /* ===== 页面标题 ===== */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: clamp(16px, 2.5vw, 28px);
            flex-wrap: wrap;
            gap: 12px;
        }
        .page-header h1 {
            font-size: clamp(20px, 3.5vw, 26px);
            font-weight: 700;
            color: var(--gray-900);
        }
        .page-header .subtitle {
            color: var(--gray-500);
            font-size: clamp(12px, 1.1vw, 14px);
            font-weight: 400;
        }

        /* ===== 统计卡片 ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(var(--card-min-width), 1fr));
            gap: clamp(12px, 1.5vw, 16px);
            margin-bottom: clamp(20px, 2.5vw, 28px);
        }
        .stat-card {
            background: white;
            border-radius: var(--radius);
            padding: clamp(14px, 1.8vw, 20px) clamp(16px, 2vw, 24px);
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-200);
            transition: var(--transition);
        }
        .stat-card:hover {
            box-shadow: var(--shadow-hover);
        }
        .stat-card .label {
            font-size: clamp(11px, 1vw, 13px);
            color: var(--gray-500);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .stat-card .value {
            font-size: clamp(24px, 4vw, 32px);
            font-weight: 700;
            color: var(--gray-900);
            margin-top: 4px;
            word-break: break-word;
        }
        .stat-card .value .unit {
            font-size: clamp(12px, 1.2vw, 16px);
            font-weight: 400;
            color: var(--gray-400);
            margin-left: 4px;
        }
        .stat-card.primary .value {
            color: var(--primary);
        }
        .stat-card.success .value {
            color: var(--success);
        }
        .stat-card.warning .value {
            color: var(--warning);
        }
        .stat-card.danger .value {
            color: var(--danger);
        }

        /* ===== 图表容器 ===== */
        .chart-container {
            background: white;
            border-radius: var(--radius);
            padding: clamp(14px, 2vw, 20px) clamp(16px, 2vw, 24px) clamp(16px, 2vw, 24px);
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-200);
            margin-bottom: clamp(20px, 2.5vw, 28px);
        }
        .chart-container h3 {
            font-size: clamp(14px, 1.4vw, 16px);
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--gray-700);
        }
        .chart-wrap {
            position: relative;
            height: clamp(180px, 30vw, 260px);
            min-height: 150px;
        }

        /* ===== 表格容器 ===== */
        .table-container {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-200);
            overflow: hidden;
            margin-bottom: 20px;
        }
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: clamp(12px, 1.5vw, 16px) clamp(14px, 1.8vw, 20px);
            border-bottom: 1px solid var(--gray-200);
            flex-wrap: wrap;
            gap: 10px;
        }
        .table-header h3 {
            font-size: clamp(14px, 1.4vw, 16px);
            font-weight: 600;
            color: var(--gray-700);
        }
        .table-actions {
            display: flex;
            gap: clamp(6px, 1vw, 10px);
            flex-wrap: wrap;
            align-items: center;
        }

        .table-scroll {
            overflow-x: auto;
            padding: 0 4px 4px 4px;
            /* ★ 触控优化 */
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: clamp(12px, 1.1vw, 14px);
            min-width: 600px;
            /* 保证在小屏可滑动 */;
        }
        table th {
            background: var(--gray-50);
            color: var(--gray-600);
            font-weight: 600;
            padding: clamp(8px, 1vw, 12px) clamp(10px, 1.2vw, 14px);
            text-align: left;
            border-bottom: 2px solid var(--gray-200);
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        table td {
            padding: clamp(8px, 1vw, 10px) clamp(10px, 1.2vw, 14px);
            border-bottom: 1px solid var(--gray-100);
            color: var(--gray-700);
            vertical-align: middle;
            word-break: break-word;
        }
        table tr:hover td {
            background: var(--gray-50);
        }
        table .status-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: clamp(10px, 0.9vw, 12px);
            font-weight: 600;
            white-space: nowrap;
        }
        .status-badge.occupied {
            background: #dcfce7;
            color: #166534;
        }
        .status-badge.vacant {
            background: #fee2e2;
            color: #991b1b;
        }

        /* ===== 按钮 ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: clamp(6px, 0.8vw, 7px) clamp(12px, 1.5vw, 16px);
            border-radius: 8px;
            font-size: clamp(12px, 1vw, 13px);
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            background: var(--gray-100);
            color: var(--gray-700);
            white-space: nowrap;
            touch-action: manipulation;
        }
        .btn:hover {
            background: var(--gray-200);
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        .btn-success {
            background: var(--success);
            color: white;
        }
        .btn-success:hover {
            background: #16a34a;
        }
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .btn-warning {
            background: var(--warning);
            color: white;
        }
        .btn-warning:hover {
            background: #d97706;
        }
        .btn-sm {
            padding: 4px 10px;
            font-size: clamp(10px, 0.9vw, 12px);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--gray-300);
        }
        .btn-outline:hover {
            background: var(--gray-50);
        }

        /* ===== 筛选 & 控件 ===== */
        .filter-group {
            display: flex;
            gap: clamp(6px, 1vw, 10px);
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-group select,
        .filter-group input {
            padding: clamp(5px, 0.7vw, 6px) clamp(8px, 1vw, 12px);
            border-radius: 8px;
            border: 1px solid var(--gray-300);
            font-size: clamp(12px, 1vw, 13px);
            background: white;
            color: var(--gray-700);
            outline: none;
            transition: var(--transition);
            min-height: 34px;
            /* 触控友好 */;
        }
        .filter-group select:focus,
        .filter-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        /* ===== 月份选择器 ===== */
        .month-selector {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .month-selector select {
            padding: clamp(5px, 0.7vw, 6px) clamp(8px, 1vw, 14px);
            border-radius: 8px;
            border: 1px solid var(--gray-300);
            font-size: clamp(12px, 1.1vw, 14px);
            background: white;
            font-weight: 500;
            outline: none;
            min-height: 34px;
        }

        /* ===== 弹窗 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(4px);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: white;
            border-radius: var(--radius);
            max-width: 640px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: clamp(20px, 3vw, 28px) clamp(16px, 3vw, 32px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: modalIn 0.25s ease;
            /* ★ 触控优化 */
            -webkit-overflow-scrolling: touch;
        }
        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(12px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .modal h2 {
            font-size: clamp(18px, 2.5vw, 20px);
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--gray-900);
        }
        .modal .form-group {
            margin-bottom: 16px;
        }
        .modal .form-group label {
            display: block;
            font-size: clamp(12px, 1vw, 13px);
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 4px;
        }
        .modal .form-group input,
        .modal .form-group select,
        .modal .form-group textarea {
            width: 100%;
            padding: clamp(8px, 0.9vw, 10px) clamp(10px, 1.2vw, 12px);
            border: 1px solid var(--gray-300);
            border-radius: 8px;
            font-size: clamp(13px, 1.1vw, 14px);
            outline: none;
            transition: var(--transition);
            background: white;
            min-height: 40px;
            /* 触控友好 */;
        }
        .modal .form-group input:focus,
        .modal .form-group select:focus,
        .modal .form-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
        }
        .modal .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: clamp(10px, 1.5vw, 14px);
        }
        .modal .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--gray-200);
            flex-wrap: wrap;
        }

        /* ===== 空状态 ===== */
        .empty-state {
            padding: clamp(30px, 5vw, 40px) 20px;
            text-align: center;
            color: var(--gray-400);
        }
        .empty-state .icon {
            font-size: clamp(36px, 6vw, 48px);
            margin-bottom: 12px;
        }
        .empty-state p {
            font-size: clamp(13px, 1.2vw, 15px);
        }

        /* ===== Toast 提示 ===== */
        .toast {
            position: fixed;
            bottom: clamp(20px, 3vw, 30px);
            right: clamp(20px, 3vw, 30px);
            left: clamp(20px, 3vw, 30px);
            max-width: 420px;
            margin: 0 auto;
            background: var(--gray-900);
            color: white;
            padding: clamp(12px, 1.5vw, 14px) clamp(16px, 2vw, 24px);
            border-radius: var(--radius);
            font-size: clamp(13px, 1.1vw, 14px);
            font-weight: 500;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            z-index: 300;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.35s ease;
            pointer-events: none;
            text-align: center;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast.success {
            background: var(--success);
        }
        .toast.error {
            background: var(--danger);
        }
        .toast.warning {
            background: var(--warning);
        }

        /* ===== 移动端菜单按钮 ===== */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: clamp(22px, 3vw, 28px);
            cursor: pointer;
            color: var(--gray-700);
            padding: 4px 8px;
            touch-action: manipulation;
        }
        .menu-toggle:hover {
            color: var(--gray-900);
        }

        /* ===== 页面切换 ===== */
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }

        /* ===== 表格内可编辑 ===== */
        .editable-cell {
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 4px;
            transition: var(--transition);
        }
        .editable-cell:hover {
            background: var(--primary-light);
        }
        .editable-cell input {
            border: 1px solid var(--primary);
            border-radius: 4px;
            padding: 2px 6px;
            width: 100%;
            font-size: 13px;
            background: white;
            outline: none;
        }

        /* ===== 辅助类 ===== */
        .text-center {
            text-align: center;
        }
        .text-muted {
            color: var(--gray-400);
            font-size: clamp(11px, 1vw, 13px);
        }
        .mt-16 {
            margin-top: 16px;
        }
        .mb-16 {
            margin-bottom: 16px;
        }
        .gap-8 {
            gap: 8px;
        }
        .flex {
            display: flex;
        }
        .flex-wrap {
            flex-wrap: wrap;
        }
        .items-center {
            align-items: center;
        }
        .w-full {
            width: 100%;
        }

        /* ================================================================
                   响应式断点 —— 针对手机、平板、电脑精细调优
                   ================================================================ */

        /* ---- 平板及以下 (≤ 1024px) ---- */
        @media (max-width: 1024px) {
            :root {
                --sidebar-width: 200px;
                --card-min-width: 130px;
            }
            .sidebar {
                padding: 20px 12px;
            }
            .sidebar-brand {
                font-size: 16px;
                padding-bottom: 16px;
                margin-bottom: 16px;
            }
            .nav-item {
                padding: 8px 12px;
                font-size: 13px;
            }
            .nav-item .icon {
                font-size: 16px;
                width: 22px;
            }
            table {
                min-width: 550px;
            }
        }

        /* ---- 手机 (≤ 768px) ---- */
        @media (max-width: 768px) {
            :root {
                --sidebar-width: 260px;
                --card-min-width: 120px;
            }

            .sidebar {
                transform: translateX(-100%);
                width: var(--sidebar-width);
                padding: 18px 12px;
            }
            .sidebar.open {
                transform: translateX(0);
            }

            .main {
                margin-left: 0;
                padding: 16px 12px 30px;
                width: 100%;
            }

            .menu-toggle {
                display: flex !important;
            }

            /* 移动端品牌标识 */
            #mobileBrand {
                display: inline !important;
                font-size: 18px;
                font-weight: 600;
                color: var(--gray-800);
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .stat-card {
                padding: 14px 16px;
            }
            .stat-card .value {
                font-size: 22px;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .page-header h1 {
                font-size: 20px;
            }

            .table-header {
                flex-direction: column;
                align-items: stretch;
            }
            .table-actions {
                justify-content: stretch;
                flex-wrap: wrap;
            }
            .table-actions .btn {
                flex: 1;
                justify-content: center;
                min-width: 80px;
            }

            .filter-group {
                flex-direction: column;
                align-items: stretch;
            }
            .filter-group select,
            .filter-group input {
                width: 100%;
            }

            .month-selector {
                flex-direction: column;
                align-items: stretch;
            }
            .month-selector select {
                width: 100%;
            }

            .modal .form-row {
                grid-template-columns: 1fr;
            }

            .modal {
                padding: 20px 16px;
                max-height: 95vh;
            }

            .chart-wrap {
                height: 180px;
                min-height: 140px;
            }

            table {
                min-width: 500px;
                font-size: 12px;
            }
            table th,
            table td {
                padding: 6px 10px;
            }

            .btn {
                font-size: 12px;
                padding: 6px 12px;
            }

            /* 移动端 toast 居中 */
            .toast {
                left: 16px;
                right: 16px;
                max-width: none;
                bottom: 16px;
                font-size: 13px;
                padding: 12px 16px;
            }

            /* 移动端表格输入框缩小 */
            table td input[type="number"] {
                width: 56px !important;
                font-size: 12px;
                padding: 3px 4px !important;
                min-height: 28px;
            }
        }

        /* ---- 小手机 (≤ 480px) ---- */
        @media (max-width: 480px) {
            :root {
                --card-min-width: 100px;
            }

            .main {
                padding: 12px 8px 24px;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .stat-card {
                padding: 12px 12px;
            }
            .stat-card .value {
                font-size: 18px;
            }
            .stat-card .label {
                font-size: 10px;
            }

            .page-header h1 {
                font-size: 18px;
            }

            table {
                min-width: 400px;

<script>
    // ================================================================
    //  DATA LAYER
    // ================================================================

    const ROOMS = [
        '门店', '101', '201', '202', '203', '204', '205',
        '301', '302', '303', '304', '305',
        '401', '402', '403', '404', '405',

        '601'
    ];

    const MONTHS = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];

    // 初始租客数据（来自Excel）
    const INITIAL_TENANTS = {
        '门店': { status: '空置', rent: '', deposit: '', name: '', gender: '', phone: '', emergency: '',
            emergencyPhone: '', idCard: '', note: '' },
        '101': { status: '空置', rent: '260~280', deposit: '', name: '', gender: '', phone: '', emergency: '',
            emergencyPhone: '', idCard: '', note: '没空调' },
        '201': { status: '在租', rent: '', deposit: '', name: '', gender: '', phone: '', emergency: '',
            emergencyPhone: '', idCard: '', note: '' },
        '202': { status: '空置', rent: '', deposit: '', name: '', gender: '', phone: '', emergency: '',
            emergencyPhone: '', idCard: '', note: '' },
        '203': { status: '空置', rent: '', deposit: '', name: '', gender: '', phone: '', emergency: '',
            emergencyPhone: '', idCard: '', note: '' },
        '204': { status: '在租', rent: '', deposit: '', name: '', gender: '', phone: '', emergency: '',
            emergencyPhone: '', idCard: '', note: '没空调（自己装）' },
        '205': { status: '在租', rent: '', deposit: '', name: '', gender: '', phone: '', emergency: '',
            emergencyPhone: '', idCard: '', note: '' },
        '301': { status: '在租', rent: '460~480', deposit: '', name: '', gender: '', phone: '', emergency: '',
            emergencyPhone: '', idCard: '', note: '' },
        '302': { status: '在租', rent: '', deposit: '', name: '', gender: '', phone: '', emergency: '',
            emergencyPhone: '', idCard: '', note: '' },
        '303': { status: '在租', rent: '', deposit: '', name: '', gender: '', phone: '', emergency: '',
            emergencyPhone: '', idCard: '', note: '' },
        '304': { status: '在租', rent: '', deposit: '', name: '', gender: '', phone: '', emergency: '',
            emergencyPhone: '', idCard: '', note: '' },
        '305': { status: '在租', rent: '', deposit: '', name: '', gender: '', phone: '', emergency: '',
            emergencyPhone: '', idCard: '', note: '' },
        '401': { status: '在租', rent: '', deposit: '', name: '', gender: '', phone: '', emergency: '',
            emergencyPhone: '', idCard: '', note: '' },
        '402': { status: '在租', rent: '280', deposit: '', name: '', gender: '', phone: '', emergency: '',
            emergencyPhone: '', idCard: '', note: '没空调（自己装），水2.5，电1，十年租客' },
        '403': { status: '空置', rent: '', deposit: '', name: '', gender: '', phone: '', emergency: '',
            emergencyPhone: '', idCard: '', note: '' },
        '404': { status: '空置', rent: '', deposit: '', name: '', gender: '', phone: '', emergency: '',
            emergencyPhone: '', idCard: '', note: '冰箱、洗衣机' },
        '405': { status: '在租', rent: '', deposit: '', name: '', gender: '', phone: '', emergency: '',
            emergencyPhone: '', idCard: '', note: '' },
        '501': { status: '在租', rent: '390', deposit: '', name: '', gender: '', phone: '', emergency: '',
            emergencyPhone: '', idCard: '', note: '' },
        '502': { status: '在租', rent: '300', deposit: '', name: '', gender: '', phone: '', emergency: '',
            emergencyPhone: '', idCard: '', note: '' },
        '503': { status: '在租', rent: '230', deposit: '', name: '', gender: '', phone: '', emergency: '',
            emergencyPhone: '', idCard: '', note: '没空调' },
        '504': { status: '在租', rent: '570', deposit: '', name: '', gender: '', phone: '', emergency: '',
            emergencyPhone: '', idCard: '', note: '' },
        '505': { status: '在租', rent: '400', deposit: '', name: '', gender: '', phone: '', emergency: '',
            emergencyPhone: '', idCard: '', note: '比较热' },
        '601': { status: '空置', rent: '', deposit: '', name: '', gender: '', phone: '', emergency: '',
            emergencyPhone: '', idCard: '', note: '' }
    };

    // 生成月度租金初始数据（每个房间每个月）
    function generateMonthlyData() {
        const data = {};
        MONTHS.forEach(month => {
            data[month] = {};
            ROOMS.forEach(room => {
                data[month][room] = {
                    tenant: '',
                    baseRent: '',
                    lastElec: 0,
                    thisElec: 0,
                    actualElec: 0,
                    elecFee: 0,
                    lastWater: 0,
                    thisWater: 0,
                    actualWater: 0,
                    waterFee: 0,
                    total: 0
                };
            });
        });
        return data;
    }

    // ================================================================
    //  STORE
    // ================================================================

    function getStore() {
        const raw = localStorage.getItem('rentSystem');
        if (raw) {
            try { return JSON.parse(raw); } catch (e) {}
        }
        return null;
    }

    function saveStore(store) {
        localStorage.setItem('rentSystem', JSON.stringify(store));
    }

    function initStore() {
        let store = getStore();
        if (!store) {
            store = {
                tenants: JSON.parse(JSON.stringify(INITIAL_TENANTS)),
                monthly: generateMonthlyData()
            };
            saveStore(store);
        }
        // 确保所有房间都存在
        let needSave = false;
        ROOMS.forEach(room => {
            if (!store.tenants[room]) {
                store.tenants[room] = { status: '空置', rent: '', deposit: '', name: '', gender: '', phone: '',
                    emergency: '', emergencyPhone: '', idCard: '', note: '' };
                needSave = true;
            }
            MONTHS.forEach(month => {
                if (!store.monthly[month]) store.monthly[month] = {};
                if (!store.monthly[month][room]) {
                    store.monthly[month][room] = { tenant: '', baseRent: '', lastElec: 0, thisElec: 0, actualElec: 0,
                        elecFee: 0, lastWater: 0, thisWater: 0, actualWater: 0, waterFee: 0, total: 0 };
                    needSave = true;
                }
            });
        });
        if (needSave) saveStore(store);
        return store;
    }

    // ================================================================
    //  APP STATE
    // ================================================================

    let store = initStore();
    let chartInstance = null;

    // ================================================================
    //  UTILITY
    // ================================================================

    function formatMoney(val) {
        if (val === undefined || val === null || isNaN(val)) return '¥0.00';
        const num = parseFloat(val);
        if (!isFinite(num)) return '¥0.00';
        return '¥' + num.toFixed(2);
    }

    function formatCurrency(val) {
        return formatMoney(val);
    }

    function getStatusBadge(status) {
        if (status === '在租') return `<span class="status-badge occupied">在租</span>`;
        return `<span class="status-badge vacant">空置</span>`;
    }

    function parseRentValue(val) {
        if (!val) return 0;
        if (typeof val === 'number') return val;
        const str = String(val).replace(/[^0-9.]/g, '');
        const num = parseFloat(str);
        return isNaN(num) ? 0 : num;
    }

    function getRentNumber(tenant) {
        const v = tenant.rent;
        if (!v) return 0;
        if (typeof v === 'number') return v;
        const match = String(v).match(/(\d+\.?\d*)/);
        if (match) return parseFloat(match[1]);
        return 0;
    }

    function showToast(msg, type = '') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'toast ' + type;
        setTimeout(() => el.classList.add('show'), 10);
        clearTimeout(el._timer);
        el._timer = setTimeout(() => el.classList.remove('show'), 2800);
    }

    // ================================================================
    //  CSV UTILS (Export/Import)
    // ================================================================

    function downloadCSV(filename, rows) {
        const processRow = (row) => {
            const finalVal = row.map(field => {
                let value = field;
                if (value === null || value === undefined) value = '';
                value = String(value);
                if (value.search(/("|,|\n)/g) >= 0) {
                    value = `"${value.replace(/"/g, '""')}"`;
                }
                return value;
            }).join(',');
            return finalVal;
        };

        let csvContent = rows.map(processRow).join('\n');
        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", filename);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function parseCSV(text) {
        const lines = text.split(/\r\n|\n/);
        const result = [];
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;

            const row = [];
            let inQuotes = false;
            let currentVal = '';

            for (let j = 0; j < line.length; j++) {
                const char = line[j];
                if (inQuotes) {
                    if (char === '"') {
                        if (j + 1 < line.length && line[j + 1] === '"') {
                            currentVal += '"';
                            j++;
                        } else {
                            inQuotes = false;
                        }
                    } else {
                        currentVal += char;
                    }
                } else {
                    if (char === '"') {
                        inQuotes = true;
                    } else if (char === ',') {
                        row.push(currentVal);
                        currentVal = '';
                    } else {
                        currentVal += char;
                    }
                }
            }
            row.push(currentVal);
            result.push(row);
        }
        return result;
    }

    function tryDecode(buffer, encoding) {
        try {
            const decoder = new TextDecoder(encoding, { fatal: true });
            const text = decoder.decode(buffer);
            if (text.includes('\uFFFD')) return null;
            return text;
        } catch (_) {
            return null;
        }
    }

    function smartDecode(buffer) {
        let text = tryDecode(buffer, 'utf-8');
        if (text !== null && !text.includes('\uFFFD')) return text;

        text = tryDecode(buffer, 'gbk');
        if (text !== null && !text.includes('\uFFFD')) return text;

        text = tryDecode(buffer, 'gb2312');
        if (text !== null && !text.includes('\uFFFD')) return text;

        try {
            const decoder = new TextDecoder('utf-8', { fatal: false });
            return decoder.decode(buffer);
        } catch (_) {
            return '';
        }
    }

    // ================================================================
    //  IMPORT HANDLERS
    // ================================================================

    function handleImport(input, type) {
        const file = input.files[0];
        if (!file) return;

        const fileName = file.name.toLowerCase();
        const isExcel = fileName.endsWith('.xlsx') || fileName.endsWith('.xls');

        const reader = new FileReader();

        reader.onload = function(e) {
            try {
                if (type === 'tenant') {
                    // 租客导入只支持 CSV
                    if (isExcel) {
                        showToast('❌ 租客导入仅支持 CSV 格式', 'error');
                        input.value = '';
                        return;
                    }
                    const arrayBuffer = e.target.result;
                    let text = smartDecode(arrayBuffer);
                    if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);

                    const data = parseCSV(text);
                    if (data.length < 2) throw new Error('文件格式错误');

                    importTenants(data);
                    showToast('✅ 租客数据导入成功', 'success');

                } else if (type === 'monthly') {
                    // 月度租金导入：区分 Excel 和 CSV
                    if (isExcel) {
                        importExcelMonthly(e.target.result);
                    } else {
                        // CSV 逻辑
                        const arrayBuffer = e.target.result;
                        let text = smartDecode(arrayBuffer);
                        if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);

                        const data = parseCSV(text);
                        if (data.length < 2) throw new Error('文件格式错误');

                        importMonthly(data);
                        showToast('✅ 月度数据导入成功', 'success');
                    }
                }
            } catch (err) {
                console.error(err);
                showToast('❌ 导入失败: ' + err.message, 'error');
            } finally {
                input.value = '';
            }
        };

        if (isExcel && type === 'monthly') {
            reader.readAsArrayBuffer(file);
        } else {
            reader.readAsArrayBuffer(file); // 统一读取 ArrayBuffer，CSV 再转文本
        }
    }

    // 处理 Excel 多 Sheet 导入
    function importExcelMonthly(arrayBuffer) {
        if (typeof XLSX === 'undefined') {
            showToast('❌ Excel处理库未加载', 'error');
            return;
        }

        const workbook = XLSX.read(arrayBuffer, { type: 'array' });
        let importedCount = 0;
        const matchedMonths = [];

        workbook.SheetNames.forEach(sheetName => {
            // 检查 Sheet 名称是否匹配预定义月份
            if (MONTHS.includes(sheetName)) {
                const worksheet = workbook.Sheets[sheetName];
                // 将 Sheet 转换为 JSON 数组 (第一行为表头)
                const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                if (jsonData && jsonData.length > 1) {
                    // 执行导入逻辑
                    processMonthlyData(sheetName, jsonData);
                    importedCount++;
                    matchedMonths.push(sheetName);
                }
            }
        });

        if (importedCount > 0) {
            saveStore(store);
            renderMonthly(); // 刷新当前视图
            showToast(`✅ 成功导入 ${importedCount} 个月份数据: ${matchedMonths.join(', ')}`, 'success');
        } else {
            showToast('⚠️ Excel中未找到匹配的月份工作表（需命名为：一月, 二月...）', 'warning');
        }
    }

    // 通用数据处理逻辑（供 CSV 和 Excel 共用）
    function processMonthlyData(month, dataRows) {
        if (!store.monthly[month]) store.monthly[month] = {};

        // dataRows[0] 是表头，从 dataRows[1] 开始是数据
        for (let i = 1; i < dataRows.length; i++) {
            const row = dataRows[i];
            if (!row || row.length < 2) continue;

            const room = String(row[0]).trim();
            if (!ROOMS.includes(room)) continue;

            if (!store.monthly[month][room]) {
                store.monthly[month][room] = { tenant: '', baseRent: '', lastElec: 0, thisElec: 0, actualElec: 0,
                    elecFee: 0, lastWater: 0, thisWater: 0, actualWater: 0, waterFee: 0, total: 0 };
            }

            const mRow = store.monthly[month][room];
            // 映射列索引: 0:房号, 1:租客, 2:基本房租, 3:上月用电, 4:本月用电, 5:实际用电, 6:电费, 7:上月用水, 8:本月用水, 9:实际用水, 10:水费, 11:总计
            mRow.tenant = row[1] || '';
            mRow.baseRent = row[2] || '';
            mRow.lastElec = parseFloat(row[3]) || 0;
            mRow.thisElec = parseFloat(row[4]) || 0;
            mRow.actualElec = parseFloat(row[5]) || 0;
            mRow.elecFee = parseFloat(row[6]) || 0;
            mRow.lastWater = parseFloat(row[7]) || 0;
            mRow.thisWater = parseFloat(row[8]) || 0;
            mRow.actualWater = parseFloat(row[9]) || 0;
            mRow.waterFee = parseFloat(row[10]) || 0;
            mRow.total = parseFloat(row[11]) || 0;
        }
    }

    // 保留原有的 CSV 导入入口，内部调用通用逻辑
    function importMonthly(data) {
        const month = document.getElementById('monthSelector').value;
        processMonthlyData(month, data);
    }

    // 导出单月 CSV (原有逻辑封装)
    function exportSingleMonthCSV(month) {
        const mData = store.monthly[month];
        const tenants = store.tenants;

        const headers = ['房号', '租客', '基本房租', '上月用电', '本月用电', '实际用电', '电费', '上月用水', '本月用水', '实际用水', '水费',

            rows.push([

                row.lastElec || 0,
                row.thisElec || 0,
                row.actualElec || 0,
                row.elecFee || 0,
                row.lastWater || 0,
                row.thisWater || 0,
                row.actualWater || 0,
                row.waterFee || 0,

            ]);
        });

    // 导出全年 Excel (新功能)
    function exportFullYearExcel() {
        if (typeof XLSX === 'undefined') {
            showToast('❌ Excel导出库加载失败，请检查网络', 'error');
            return;
        }

        const wb = XLSX.utils.book_new();
        const tenants = store.tenants;
        const headers = ['房号', '租客', '基本房租', '上月用电', '本月用电', '实际用电', '电费', '上月用水', '本月用水', '实际用水', '水费', '房租总计'];

        MONTHS.forEach(month => {
            const mData = store.monthly[month] || {};
            const rows = [headers];

            ROOMS.forEach(room => {
                const tenantInfo = tenants[room] || {};
                // 只导出在租房间
                if (tenantInfo.status !== '在租') return;

                const row = mData[room] || {};
                const baseRent = tenantInfo.rent || row.baseRent || '';

                rows.push([
                    room,
                    tenantInfo.name || row.tenant || '',
                    baseRent,
                    row.lastElec || 0,
                    row.thisElec || 0,
                    row.actualElec || 0,
                    row.elecFee || 0,
                    row.lastWater || 0,
                    row.thisWater || 0,
                    row.actualWater || 0,
                    row.waterFee || 0,
                    row.total || 0
                ]);
            });

            // 如果该月有数据（至少有一行表头），则创建Sheet
            if (rows.length > 1) {
                const ws = XLSX.utils.aoa_to_sheet(rows);

                // 设置列宽 (可选，优化显示)
                ws['!cols'] = [
                    {wch: 8}, {wch: 10}, {wch: 10}, {wch: 10}, {wch: 10},
                    {wch: 10}, {wch: 10}, {wch: 10}, {wch: 10}, {wch: 10},
                    {wch: 10}, {wch: 12}
                ];

                XLSX.utils.book_append_sheet(wb, ws, month);
            }
        });

        const dateStr = new Date().toISOString().slice(0, 10);
        XLSX.writeFile(wb, `全年租金统计_${dateStr}.xlsx`);
        showToast('✅ 全年数据已导出 (Excel)', 'success');
    }

    function exportTenants() {

    // ================================================================
    //  IMPORT DATA PROCESSORS (Legacy for Tenants)
    // ================================================================

    function importTenants(data) {
        for (let i = 1; i < data.length; i++) {
            const row = data[i];
            if (row.length < 2) continue;

            const room = row[0].trim();
            if (!ROOMS.includes(room)) {
                console.warn(`跳过未知房号: ${room}`);
                continue;
            }

            const status = row[1].trim();
            store.tenants[room] = {
                status: (status === '在租' || status === '空置') ? status : '空置',
                rent: row[2] || '',
                deposit: row[3] || '',
                name: row[4] || '',
                gender: row[5] || '',
                phone: row[6] || '',
                emergency: row[7] || '',
                emergencyPhone: row[8] || '',
                note: row[9] || ''
            };
        }
        saveStore(store);
        renderTenants();
    }

    function renderDashboard() {
        const tenants = store.tenants;

            vacant = 0;
        ROOMS.forEach(room => {
            if (tenants[room] && tenants[room].status === '在租') occupied++;
            else vacant++;
        });
        document.getElementById('statTotal').textContent = total;
        document.getElementById('statOccupied').textContent = occupied;

        let totalRent = 0;
        MONTHS.forEach(month => {
            const mData = store.monthly[month];
            if (mData) {

                    if (mData[room] && mData[room].total) {
                        totalRent += parseFloat(mData[room].total) || 0;
                    }
                });
            }

        document.getElementById('statTotalRent').textContent = formatMoney(totalRent);

            });

    function renderChart() {
        const ctx = document.getElementById('rentChart').getContext('2d');
        const monthlyTotals = MONTHS.map(month => {
            let sum = 0;
            const mData = store.monthly[month];
            if (mData) {
                ROOMS.forEach(room => {
                    if (mData[room] && mData[room].total) {
                        sum += parseFloat(mData[room].total) || 0;
                    }
                });
            }
            return Math.round(sum * 100) / 100;
        });

        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: MONTHS,
                datasets: [{
                    label: '月租金收入 (元)',

                    backgroundColor: 'rgba(59, 130, 246, 0.7)',

                    borderRadius: 6,

            options: {

                maintainAspectRatio: false,

                    tooltip: {
                        callbacks: {
                            label: function(context) {

                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {

    // ================================================================
    //  MONTHLY
    // ================================================================

    function carryForward(month) {
        const monthIndex = MONTHS.indexOf(month);
        if (monthIndex <= 0) return;
        const prevMonth = MONTHS[monthIndex - 1];
        const prevData = store.monthly[prevMonth];
        if (!prevData) return;

        const currentData = store.monthly[month];
        if (!currentData) return;

        let updated = false;
        ROOMS.forEach(room => {
            const prevRow = prevData[room];
            if (!prevRow) return;
            if (!currentData[room]) {
                currentData[room] = { tenant: '', baseRent: '', lastElec: 0, thisElec: 0, actualElec: 0,
                    elecFee: 0, lastWater: 0, thisWater: 0, actualWater: 0, waterFee: 0, total: 0 };
                updated = true;
            }
            const curRow = currentData[room];
            if (curRow.lastElec === undefined || curRow.lastElec === null || curRow.lastElec === 0) {
                curRow.lastElec = prevRow.thisElec || 0;
                updated = true;
            }
            if (curRow.lastWater === undefined || curRow.lastWater === null || curRow.lastWater === 0) {
                curRow.lastWater = prevRow.thisWater || 0;
                updated = true;
            }
        });
        if (updated) {
            saveStore(store);
        }
    }

        carryForward(month);

        const mData = store.monthly[month];

                        <th>上月用水</th><th>本月用水</th><th>实际用水</th><th>水费</th>
                        <th>房租总计</th>
                    </tr></thead><tbody>`;

        ROOMS.forEach(room => {
            const row = mData[room] || { tenant: '', baseRent: '', lastElec: 0, thisElec: 0, actualElec: 0,
                elecFee: 0, lastWater: 0, thisWater: 0, actualWater: 0, waterFee: 0, total: 0 };
            const tenantInfo = tenants[room] || {};

            if (!isOccupied) {
                html += `<tr style="color:var(--gray-400);">
                            <td>${room}</td><td>-</td><td>-</td>
                            <td>-</td><td>-</td><td>-</td><td>-</td>
                            <td>-</td><td>-</td><td>-</td><td>-</td>
                            <td>-</td>
                        </tr>`;
                return;
            }

            const thisElec = row.thisElec ?? '';
            const thisWater = row.thisWater ?? '';

            const baseRent = tenantInfo.rent || row.baseRent || '';
            const total = parseFloat(row.total) || 0;
            totalSum += total;

            html += `<tr>
                        <td><strong>${room}</strong></td>
                        <td>${tenantInfo.name || row.tenant || '-'}</td>
                        <td>${baseRent || '-'}</td>
                        <td>${row.lastElec ?? '-'}</td>
                        <td>
                            <input type="number" step="0.01" value="${thisElec}"
                                   style="width:clamp(48px,6vw,70px); padding:clamp(2px,0.4vw,4px) clamp(4px,0.6vw,6px); border:1px solid var(--gray-300); border-radius:6px; font-size:clamp(11px,0.9vw,13px); min-height:28px;"
                                   onchange="updateMonthlyField('${month}','${room}','thisElec', this.value)"
                                   onkeydown="if(event.key==='Enter') this.blur()" />
                        </td>
                        <td>${row.actualElec ?? '-'}</td>
                        <td>${row.elecFee ? formatMoney(row.elecFee) : '-'}</td>
                        <td>${row.lastWater ?? '-'}</td>
                        <td>
                            <input type="number" step="0.01" value="${thisWater}"
                                   style="width:clamp(48px,6vw,70px); padding:clamp(2px,0.4vw,4px) clamp(4px,0.6vw,6px); border:1px solid var(--gray-300); border-radius:6px; font-size:clamp(11px,0.9vw,13px); min-height:28px;"
                                   onchange="updateMonthlyField('${month}','${room}','thisWater', this.value)"
                                   onkeydown="if(event.key==='Enter') this.blur()" />
                        </td>
                        <td>${row.actualWater ?? '-'}</td>
                        <td>${row.waterFee ? formatMoney(row.waterFee) : '-'}</td>
                        <td><strong>${total ? formatMoney(total) : '-'}</strong></td>
                    </tr>`;
        });

        html += `</tbody></table>`;
        document.getElementById('monthlyTableWrap').innerHTML = html;
        document.getElementById('monthlyTotal').textContent = `总计：${formatMoney(totalSum)}`;
    }

    function updateMonthlyField(month, room, field, value) {
        if (!store.monthly[month]) store.monthly[month] = {};
        if (!store.monthly[month][room]) {
            store.monthly[month][room] = { tenant: '', baseRent: '', lastElec: 0, thisElec: 0, actualElec: 0,
                elecFee: 0, lastWater: 0, thisWater: 0, actualWater: 0, waterFee: 0, total: 0 };
        }
        const row = store.monthly[month][room];
        row[field] = parseFloat(value) || 0;

        const lastElec = row.lastElec || 0;
        const thisElec = row.thisElec || 0;
        row.actualElec = Math.max(0, thisElec - lastElec);
        row.elecFee = row.actualElec * 1.2;

        const lastWater = row.lastWater || 0;
        const thisWater = row.thisWater || 0;
        row.actualWater = Math.max(0, thisWater - lastWater);
        row.waterFee = row.actualWater * 3;

        const tenant = store.tenants[room];
        const baseRent = tenant && tenant.rent ? parseRentValue(tenant.rent) : 0;
        row.total = baseRent + (row.elecFee || 0) + (row.waterFee || 0);

        saveStore(store);
        renderMonthly();
    }

    // ================================================================
    //  REFRESH
    // ================================================================

    function refreshData() {
        store = getStore();
        if (!store) {
            store = initStore();
        }
        renderDashboard();
        renderTenants();
        renderMonthly();
        showToast('🔄 数据已刷新', 'success');
    }

    // ================================================================
    //  INIT
    // ================================================================

    renderDashboard();
    renderTenants();
    renderMonthly();

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeTenantModal();
        }
    });

    console.log('🏠 房屋出租管理系统 v2.5 已启动（支持Excel批量导入）');
</script>

</body>
</html>
